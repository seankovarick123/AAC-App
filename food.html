<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="food.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text){
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function goHome(){
  window.location.href = "index.html";
}

const columns = 10;
const rows = 6;

// BASIC FOOD SET (we can map perfectly later)
const actions = {

"1-1":"HOME","2-1":"eat","3-1":"drink","4-1":"food","5-1":"snack","6-1":"meal","7-1":"hungry","8-1":"thirsty",

"1-2":"apple","2-2":"banana","3-2":"orange","4-2":"grapes","5-2":"strawberry",

"1-3":"pizza","2-3":"burger","3-3":"fries","4-3":"chicken","5-3":"sandwich",

"1-4":"water","2-4":"juice","3-4":"milk","4-4":"soda",

"1-5":"I am hungry","2-5":"I want food","3-5":"I want a snack","4-5":"I am thirsty",

"10-6":"NEXT"
};

const grid = document.getElementById("grid");

for (let r = 1; r <= rows; r++) {
  for (let c = 1; c <= columns; c++) {

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.gridColumn = c;
    cell.style.gridRow = r;

    const key = `${c}-${r}`;

    if (key === "1-1") {
      cell.onclick = goHome;
    }
    else if (actions[key]) {
      cell.onclick = () => speak(actions[key]);
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
