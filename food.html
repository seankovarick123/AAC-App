<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

.container {
  position: relative;
  width:100%;
  height:100%;
}

/* FORCE IMAGE FULLSCREEN */
.bg {
  position:absolute;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit: fill;
}

/* GRID OVERLAY */
.grid {
  position:absolute;
  top:12%;
  left:0;
  width:100%;
  height:88%;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="food.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text){
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function goHome(){
  window.location.href = "index.html";
}

const grid = document.getElementById("grid");

for (let r = 1; r <= 6; r++) {
  for (let c = 1; c <= 10; c++) {

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.gridColumn = c;
    cell.style.gridRow = r;

    const key = `${c}-${r}`;

    if (key === "1-1") {
      cell.onclick = goHome;
    } else {
      cell.onclick = () => speak(`food ${c}-${r}`);
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
