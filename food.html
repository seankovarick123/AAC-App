<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="food.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text) {
  const synth = window.speechSynthesis;

  if (synth.getVoices().length === 0) {
    synth.onvoiceschanged = () => speak(text);
    return;
  }

  const msg = new SpeechSynthesisUtterance(text);
  synth.cancel();
  synth.speak(msg);
}

function goHome(){
  window.location.href = "index.html";
}

const columns = 10;
const rows = 6;

// FOOD TILE MAPPING
const actions = {
  // TOP ROW
  "1-1": "HOME",
  "2-1": "pizza",
  "3-1": "burger",
  "4-1": "fries",
  "5-1": "chicken",
  "6-1": "hot dog",
  "7-1": "sandwich",
  "8-1": "taco",
  "9-1": "pasta",
  "10-1": "rice",

  // SECOND ROW
  "1-2": "apple",
  "2-2": "banana",
  "3-2": "grapes",
  "4-2": "orange",
  "5-2": "strawberry",
  "6-2": "watermelon",
  "7-2": "carrot",
  "8-2": "broccoli",
  "9-2": "corn",
  "10-2": "salad",

  // THIRD ROW
  "1-3": "milk",
  "2-3": "water",
  "3-3": "juice",
  "4-3": "soda",
  "5-3": "coffee",
  "6-3": "tea",
  "7-3": "smoothie",
  "8-3": "shake",

  // FOURTH ROW (phrases)
  "1-4": "I am hungry",
  "2-4": "I want food",
  "3-4": "I want a snack",
  "4-4": "I am thirsty",
  "5-4": "I want a drink"
};

const grid = document.getElementById("grid");

for (let r = 1; r <= rows; r++) {
  for (let c = 1; c <= columns; c++) {

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.gridColumn = c;
    cell.style.gridRow = r;

    const key = `${c}-${r}`;

    if (actions[key]) {
      if (actions[key] === "HOME") {
        cell.onclick = goHome;
      } else {
        cell.onclick = () => speak(actions[key]);
      }
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
