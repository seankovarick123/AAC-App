<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; }
.container { position: relative; }
.bg { width: 100%; display:block; }

.grid {
  position:absolute;
  top:12%;
  left:0;
  width:100%;
  height:88%;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(6,1fr);
}

.cell { width:100%; height:100%; }
</style>
</head>

<body>
<div class="container">
  <img src="food.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text){
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function goHome(){
  window.location.href = "index.html";
}

const actions = {
  "1-1":"HOME",
  "2-1":"eat",
  "3-1":"drink",
  "4-1":"food",
  "5-1":"snack",
  "6-1":"hungry",

  "1-2":"apple",
  "2-2":"banana",
  "3-2":"pizza",
  "4-2":"burger",
  "5-2":"fries",

  "1-3":"water",
  "2-3":"juice",
  "3-3":"milk",
  "4-3":"soda"
};

const grid = document.getElementById("grid");

for(let r=1;r<=6;r++){
  for(let c=1;c<=10;c++){
    const cell=document.createElement("div");
    cell.className="cell";
    cell.style.gridColumn=c;
    cell.style.gridRow=r;

    const key=`${c}-${r}`;

    if(key==="1-1"){
      cell.onclick=goHome;
    } else if(actions[key]){
      cell.onclick=()=>speak(actions[key]);
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
