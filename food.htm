<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

.tile {
  position: absolute;
  background: rgba(0,0,0,0);
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <img src="Food.jpeg" class="bg">

  <!-- BACK BUTTON -->
  <button class="tile" style="top:2%; left:2%; width:15%; height:10%;" onclick="go('index.html')"></button>

  <!-- SAMPLE FOOD TILES (mapped from your image) -->
  <button class="tile" style="top:45%; left:35%; width:15%; height:12%;" onclick="speak('cookie')"></button>
  <button class="tile" style="top:60%; left:35%; width:15%; height:12%;" onclick="speak('crackers')"></button>
  <button class="tile" style="top:60%; left:50%; width:15%; height:12%;" onclick="speak('goldfish')"></button>
  <button class="tile" style="top:60%; left:65%; width:15%; height:12%;" onclick="speak('cheddar crackers')"></button>

  <button class="tile" style="top:75%; left:35%; width:15%; height:12%;" onclick="speak('pretzels')"></button>
  <button class="tile" style="top:75%; left:50%; width:15%; height:12%;" onclick="speak('nuts')"></button>
  <button class="tile" style="top:75%; left:65%; width:15%; height:12%;" onclick="speak('pizza')"></button>

</div>

<script>
function speak(word){
  speechSynthesis.speak(new SpeechSynthesisUtterance(word));
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
