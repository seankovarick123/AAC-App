<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; }
.container { position: relative; }
.bg { width: 100%; display: block; }

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell { width:100%; height:100%; }
</style>
</head>
<body>

<div class="container">
  <img src="places.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(t){ speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
function goHome(){ location.href="index.html"; }

const actions = {
  "1-1":"HOME","2-1":"home","3-1":"school","4-1":"store","5-1":"park",
  "6-1":"hospital","7-1":"restaurant","8-1":"bathroom","9-1":"bedroom","10-1":"kitchen",

  "1-2":"living room","2-2":"outside","3-2":"playground","4-2":"car","5-2":"bus",

  "1-3":"I want to go home","2-3":"take me to school","3-3":"I want to go outside","4-3":"I need the bathroom"
};

buildGrid(actions);

function buildGrid(actions){
  const grid = document.getElementById("grid");
  for(let r=1;r<=6;r++){
    for(let c=1;c<=10;c++){
      let cell=document.createElement("div");
      cell.className="cell";
      cell.style.gridColumn=c;
      cell.style.gridRow=r;

      let key=`${c}-${r}`;
      if(actions[key]){
        if(actions[key]==="HOME"){ cell.onclick=goHome; }
        else{ cell.onclick=()=>speak(actions[key]); }
      }

      grid.appendChild(cell);
    }
  }
}
</script>
</body>
</html>
