<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="places.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text){
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function goHome(){
  window.location.href = "index.html";
}

// optional next page later
function goNext(){
  // window.location.href = "places2.html";
}

const columns = 10;
const rows = 6;

const actions = {

/* ROW 1 */
"1-1":"HOME","2-1":"building","3-1":"airport","4-1":"aquarium","5-1":"bank","6-1":"place","7-1":"bowling alley","8-1":"restaurant","9-1":"store","10-1":"geography",

/* ROW 2 */
"1-2":"all places","2-2":"church","3-2":"doctor","4-2":"to","5-2":"grocery","6-2":"mall","7-2":"movie","8-2":"restaurant","9-2":"store",

/* ROW 3 */
"1-3":"home","2-3":"house","3-3":"bathroom","4-3":"closet","5-3":"dining room","6-3":"kitchen","7-3":"living room","8-3":"room",

/* ROW 4 */
"1-4":"outside","2-4":"beach","3-4":"camp","4-4":"farm","5-4":"garden","6-4":"jungle gym","7-4":"lake","8-4":"ocean","9-4":"park","10-4":"playground",

/* ROW 5 */
"1-5":"pond","2-5":"pool","3-5":"river","4-5":"yard","5-5":"zoo","6-5":"baseball","7-5":"basketball","8-5":"football","9-5":"soccer",

/* ROW 6 */
"2-6":"school","3-6":"bus","4-6":"class","5-6":"library","6-6":"lunch","7-6":"therapy","8-6":"speech","9-6":"OT","10-6":"PT"
};

const grid = document.getElementById("grid");

for (let r = 1; r <= rows; r++) {
  for (let c = 1; c <= columns; c++) {

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.gridColumn = c;
    cell.style.gridRow = r;

    const key = `${c}-${r}`;

    // HOME button
    if (key === "1-1") {
      cell.onclick = goHome;
    }

    // LOCK tile (row 2 col 10)
    else if (key === "10-2") {
      // leave blank or add lock behavior later
    }

    // NEXT arrow (row 5 col 10)
    else if (key === "10-5") {
      cell.onclick = goNext;
    }

    // normal speech tiles
    else if (actions[key]) {
      cell.onclick = () => speak(actions[key]);
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
