<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

.sentence-bar {
  position:fixed; top:0; width:100%;
  background:white; padding:12px;
  display:flex; justify-content:space-between;
  border-bottom:2px solid #ddd;
}

.sentence { font-size:20px; }

.grid {
  margin-top:70px;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
  padding:12px;
}

.tile {
  background:white;
  border-radius:15px;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.category { background:#d0e6ff; }
.core { background:#e6ffd0; }

</style>
</head>

<body>

<div class="sentence-bar">
  <div class="sentence" id="sentence"></div>
  <div>
    <button onclick="speak()">🔊</button>
    <button onclick="clearSentence()">❌</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
let sentence = [];

const pages = {

home: [
  {text:"I", type:"core"},
  {text:"me", type:"core"},
  {text:"you", type:"core"},
  {text:"my", type:"core"},
  {text:"is", type:"core"},
  {text:"can", type:"core"},
  {text:"do", type:"core"},

  {text:"People", nav:"people"},
  {text:"Food", nav:"food"},
  {text:"Actions", nav:"actions"},
  {text:"Places", nav:"places"}
],

food: [
  {text:"eat"},
  {text:"drink"},
  {text:"cookie"},
  {text:"crackers"},
  {text:"pizza"},
  {text:"chips"},
  {text:"popcorn"},
  {text:"snack"},
  {text:"back", nav:"home"}
],

people: [
  {text:"mom"},
  {text:"dad"},
  {text:"grandma"},
  {text:"grandpa"},
  {text:"friend"},
  {text:"baby"},
  {text:"family"},
  {text:"back", nav:"home"}
],

actions: [
  {text:"go"},
  {text:"help"},
  {text:"open"},
  {text:"play"},
  {text:"read"},
  {text:"stop"},
  {text:"sleep"},
  {text:"back", nav:"home"}
],

places: [
  {text:"home"},
  {text:"school"},
  {text:"park"},
  {text:"store"},
  {text:"restaurant"},
  {text:"bathroom"},
  {text:"back", nav:"home"}
]

};

function load(page){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  pages[page].forEach(item=>{
    const div = document.createElement("div");
    div.className = "tile";

    if(item.type==="core") div.classList.add("core");
    if(item.nav) div.classList.add("category");

    div.innerText = item.text;

    div.onclick = ()=>{
      if(item.nav){
        load(item.nav);
      } else {
        sentence.push(item.text);
        update();
        speakWord(item.text);
      }
    };

    grid.appendChild(div);
  });
}

function update(){
  document.getElementById("sentence").innerText = sentence.join(" ");
}

function speak(){
  const speech = new SpeechSynthesisUtterance(sentence.join(" "));
  speechSynthesis.speak(speech);
}

function speakWord(word){
  const speech = new SpeechSynthesisUtterance(word);
  speechSynthesis.speak(speech);
}

function clearSentence(){
  sentence = [];
  update();
}

load("home");
</script>

</body>
</html>
