<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 999;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="home.png" class="bg">

  <div class="grid">

    <!-- WATCH (test first) -->
    <div class="cell" style="grid-column:4; grid-row:1; background: rgba(0,255,0,0.4);" onclick="goWatch()"></div>

  </div>
</div>

<script>
function goWatch(){
  window.location.href = "watch.html";
}
</script>

</body>
</html>
