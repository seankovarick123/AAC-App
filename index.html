<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  z-index: 1000;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>
