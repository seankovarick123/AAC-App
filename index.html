<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0%;
  width: 100%;
  height: 88%;
  z-index: 999;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="home.png" class="bg">

  <div class="grid">

    <!-- PEOPLE -->
    <div class="cell" style="grid-column:2; grid-row:1;" onclick="go('people','people.html')"></div>

    <!-- ACTIONS -->
    <div class="cell" style="grid-column:3; grid-row:1;" onclick="go('actions','actions.html')"></div>

    <!-- GO -->
    <div class="cell" style="grid-column:4; grid-row:1;" onclick="go('go','watch.html')"></div>

    <!-- PLACES -->
    <div class="cell" style="grid-column:5; grid-row:1;" onclick="go('places','places.html')"></div>

    <!-- READ -->
    <div class="cell" style="grid-column:7; grid-row:1;" onclick="go('read','read.html')"></div>

    <!-- YOUTUBE -->
    <div class="cell" style="grid-column:8; grid-row:1;" onclick="go('youtube','watch2.html')"></div>

    <!-- EAT -->
    <div class="cell" style="grid-column:9; grid-row:1;" onclick="go('eat','food.html')"></div>

    <!-- PLAY -->
    <div class="cell" style="grid-column:10; grid-row:1;" onclick="go('play','play2.html')"></div>

  </div>
</div>

<script>
function speak(word){
  const msg = new SpeechSynthesisUtterance(word);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

function go(word, page){
  speak(word);
  setTimeout(() => {
    window.location.href = page;
  }, 300);
}
</script>

</body>
</html>
