<!DOCTYPE html>
<html>
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAC Speech App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    .sentence-bar {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      padding: 15px;
      border-bottom: 2px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sentence-text {
      font-size: 20px;
      flex: 1;
      margin-right: 10px;
    }

    .controls button {
      margin-left: 5px;
      padding: 10px;
      font-size: 16px;
    }

    .categories {
      margin-top: 80px;
      display: flex;
      overflow-x: auto;
      background: #fff;
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .category {
      margin-right: 10px;
      padding: 10px 15px;
      background: #007aff;
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 15px;
    }

    .tile {
      background: white;
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .tile img {
      width: 100%;
      border-radius: 10px;
    }

    .tile p {
      font-size: 18px;
      margin: 10px 0 0;
    }
  </style>
</head>

<body>

<div class="sentence-bar">
  <div class="sentence-text" id="sentence"></div>
  <div class="controls">
    <button onclick="speakSentence()">🔊</button>
    <button onclick="clearSentence()">❌</button>
  </div>
</div>

<div class="categories">
  <div class="category" onclick="loadCategory('needs')">Needs</div>
  <div class="category" onclick="loadCategory('food')">Food</div>
  <div class="category" onclick="loadCategory('feelings')">Feelings</div>
</div>

<div class="grid" id="grid"></div>

<script>
let sentence = [];

const categories = {
  needs: [
    { text: "I want", img: "https://via.placeholder.com/150" },
    { text: "Help", img: "https://via.placeholder.com/150" },
    { text: "Stop", img: "https://via.placeholder.com/150" }
  ],
  food: [
    { text: "Apple", img: "https://via.placeholder.com/150" },
    { text: "Drink", img: "https://via.placeholder.com/150" },
    { text: "Snack", img: "https://via.placeholder.com/150" }
  ],
  feelings: [
    { text: "Happy", img: "https://via.placeholder.com/150" },
    { text: "Sad", img: "https://via.placeholder.com/150" },
    { text: "Tired", img: "https://via.placeholder.com/150" }
  ]
};

function loadCategory(name) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  categories[name].forEach(item => {
    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
      <img src="${item.img}">
      <p>${item.text}</p>
    `;

    tile.onclick = () => addWord(item.text);

    grid.appendChild(tile);
  });
}

function addWord(word) {
  sentence.push(word);
  document.getElementById("sentence").innerText = sentence.join(" ");
}

function speakSentence() {
  const text = sentence.join(" ");
  const speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

function clearSentence() {
  sentence = [];
  document.getElementById("sentence").innerText = "";
}

// load default
loadCategory('needs');
</script>

</body>
</html>
