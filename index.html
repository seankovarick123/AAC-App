<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

.tile {
  position: absolute;
  background: rgba(0,0,0,0);
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <img src="Home.jpeg" class="bg">

  <!-- CORE WORDS (top row rough mapping) -->
  <button class="tile" style="top:15%; left:5%; width:18%; height:12%;" onclick="speak('I')"></button>
  <button class="tile" style="top:15%; left:25%; width:18%; height:12%;" onclick="speak('me')"></button>
  <button class="tile" style="top:15%; left:45%; width:18%; height:12%;" onclick="speak('you')"></button>
  <button class="tile" style="top:15%; left:65%; width:18%; height:12%;" onclick="speak('my')"></button>

  <!-- CATEGORY BUTTONS (based on your layout) -->
  <button class="tile" style="top:45%; left:10%; width:22%; height:20%;" onclick="go('people.html')"></button>
  <button class="tile" style="top:45%; left:38%; width:22%; height:20%;" onclick="go('food.html')"></button>
  <button class="tile" style="top:45%; left:66%; width:22%; height:20%;" onclick="go('actions.html')"></button>

</div>

<script>
function speak(word){
  speechSynthesis.speak(new SpeechSynthesisUtterance(word));
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
