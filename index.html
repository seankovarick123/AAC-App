<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

.tile {
  position: absolute;
  border: none;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
  <img src="Home.jpeg" class="bg">

  <!-- TEST BUTTON (VISIBLE FOOD BUTTON) -->
  <button class="tile" style="
    top:40%; 
    left:30%; 
    width:40%; 
    height:30%; 
    background: rgba(255,0,0,0.3);
    border: 2px solid red;
  " onclick="go('food.html')">
  FOOD
  </button>

</div>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
