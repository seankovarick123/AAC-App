<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<style>
body { margin:0; font-family:Arial; background:#f0f2f5; }

.sentence-bar {
  position:fixed; top:0; width:100%;
  background:white; padding:15px;
  display:flex; justify-content:space-between;
  border-bottom:2px solid #ddd;
}

.sentence { font-size:22px; }

.grid {
  margin-top:80px;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  padding:15px;
}

.tile {
  background:white;
  border-radius:20px;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.nav {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.nav button {
  padding:15px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="sentence-bar">
  <div class="sentence" id="sentence"></div>
  <div>
    <button onclick="speak()">🔊</button>
    <button onclick="clearSentence()">❌</button>
  </div>
</div>

<div class="nav">
  <button onclick="load('home')">Home</button>
  <button onclick="load('food')">Food</button>
  <button onclick="load('people')">People</button>
  <button onclick="load('actions')">Actions</button>
</div>

<div class="grid" id="grid"></div>

<script>
let sentence = [];

const data = {

home: [
  "I","me","you","want",
  "help","go","stop","more"
],

food: [
  "eat","drink","cookie","crackers",
  "pizza","chips","popcorn","snack"
],

people: [
  "mom","dad","grandma","grandpa",
  "friend","baby","teacher","family"
],

actions: [
  "go","help","open","play",
  "read","stop","sleep","eat"
]

};

function load(page){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data[page].forEach(word=>{
    const div = document.createElement("div");
    div.className = "tile";
    div.innerText = word;

    div.onclick = ()=>{
      sentence.push(word);
      update();
      speakWord(word);
    };

    grid.appendChild(div);
  });
}

function update(){
  document.getElementById("sentence").innerText = sentence.join(" ");
}

function speak(){
  const speech = new SpeechSynthesisUtterance(sentence.join(" "));
  speechSynthesis.speak(speech);
}

function speakWord(word){
  const speech = new SpeechSynthesisUtterance(word);
  speechSynthesis.speak(speech);
}

function clearSentence(){
  sentence = [];
  update();
}

load('home');
</script>

</body>
</html>
