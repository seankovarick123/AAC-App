<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; }
.container { position: relative; }
.bg { width: 100%; display:block; }

.grid {
  position:absolute;
  top:12%;
  left:0;
  width:100%;
  height:88%;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(6,1fr);
}

.cell { width:100%; height:100%; }
</style>
</head>

<body>
<div class="container">
  <img src="home.png" class="bg">
  <div class="grid">

    <!-- ROW 1 -->
    <div class="cell" style="grid-column:1;grid-row:1;" onclick="speak('abc')"></div>
    <div class="cell" style="grid-column:2;grid-row:1;" onclick="go('people.html')"></div>
    <div class="cell" style="grid-column:3;grid-row:1;" onclick="speak('question')"></div>
    <div class="cell" style="grid-column:4;grid-row:1;" onclick="go('actions.html')"></div>
    <div class="cell" style="grid-column:5;grid-row:1;" onclick="go('index.html')"></div>
    <div class="cell" style="grid-column:6;grid-row:1;" onclick="go('places.html')"></div>
    <div class="cell" style="grid-column:7;grid-row:1;" onclick="speak('time')"></div>
    <div class="cell" style="grid-column:8;grid-row:1;" onclick="speak('and')"></div>
    <div class="cell" style="grid-column:9;grid-row:1;" onclick="speak('describe')"></div>
    <div class="cell" style="grid-column:10;grid-row:1;" onclick="speak('good')"></div>

    <!-- ROW 2 -->
    <div class="cell" style="grid-column:1;grid-row:2;" onclick="speak('clear')"></div>
    <div class="cell" style="grid-column:2;grid-row:2;" onclick="speak('I')"></div>
    <div class="cell" style="grid-column:3;grid-row:2;" onclick="speak('me')"></div>
    <div class="cell" style="grid-column:4;grid-row:2;"></div>
    <div class="cell" style="grid-column:5;grid-row:2;" onclick="speak('then')"></div>
    <div class="cell" style="grid-column:6;grid-row:2;" onclick="speak('come')"></div>
    <div class="cell" style="grid-column:7;grid-row:2;" onclick="speak('that')"></div>
    <div class="cell" style="grid-column:8;grid-row:2;" onclick="speak('a')"></div>
    <div class="cell" style="grid-column:9;grid-row:2;" onclick="speak('groups')"></div>
    <div class="cell" style="grid-column:10;grid-row:2;" onclick="speak('more')"></div>

    <!-- ROW 3 -->
    <div class="cell" style="grid-column:1;grid-row:3;"></div>
    <div class="cell" style="grid-column:2;grid-row:3;" onclick="speak('my')"></div>
    <div class="cell" style="grid-column:3;grid-row:3;" onclick="speak('is')"></div>
    <div class="cell" style="grid-column:4;grid-row:3;" onclick="go('food.html')"></div>
    <div class="cell" style="grid-column:5;grid-row:3;" onclick="speak('drink')"></div>
    <div class="cell" style="grid-column:6;grid-row:3;" onclick="speak('finish')"></div>
    <div class="cell" style="grid-column:7;grid-row:3;" onclick="speak('get')"></div>
    <div class="cell" style="grid-column:8;grid-row:3;" onclick="speak('all')"></div>
    <div class="cell" style="grid-column:9;grid-row:3;"></div>
    <div class="cell" style="grid-column:10;grid-row:3;" onclick="speak('colors')"></div>

    <!-- ROW 4 -->
    <div class="cell" style="grid-column:1;grid-row:4;" onclick="speak('potty')"></div>
    <div class="cell" style="grid-column:2;grid-row:4;" onclick="speak('it')"></div>
    <div class="cell" style="grid-column:3;grid-row:4;" onclick="speak('can')"></div>
    <div class="cell" style="grid-column:4;grid-row:4;" onclick="go('watch.html')"></div>
    <div class="cell" style="grid-column:5;grid-row:4;" onclick="speak('help')"></div>
    <div class="cell" style="grid-column:6;grid-row:4;" onclick="speak('open')"></div>
    <div class="cell" style="grid-column:7;grid-row:4;" onclick="speak('put')"></div>
    <div class="cell" style="grid-column:8;grid-row:4;" onclick="speak('in')"></div>
    <div class="cell" style="grid-column:9;grid-row:4;" onclick="speak('here')"></div>
    <div class="cell" style="grid-column:10;grid-row:4;" onclick="speak('on')"></div>

    <!-- ROW 5 -->
    <div class="cell" style="grid-column:1;grid-row:5;" onclick="speak('extra words')"></div>
    <div class="cell" style="grid-column:2;grid-row:5;" onclick="speak('you')"></div>
    <div class="cell" style="grid-column:3;grid-row:5;" onclick="speak('do')"></div>
    <div class="cell" style="grid-column:4;grid-row:5;" onclick="speak('like')"></div>
    <div class="cell" style="grid-column:5;grid-row:5;" onclick="go('play2.html')"></div>
    <div class="cell" style="grid-column:6;grid-row:5;" onclick="go('read.html')"></div>
    <div class="cell" style="grid-column:7;grid-row:5;" onclick="speak('stop')"></div>
    <div class="cell" style="grid-column:8;grid-row:5;" onclick="speak('out')"></div>
    <div class="cell" style="grid-column:9;grid-row:5;" onclick="speak('up')"></div>
    <div class="cell" style="grid-column:10;grid-row:5;" onclick="speak('off')"></div>

    <!-- ROW 6 -->
    <div class="cell" style="grid-column:1;grid-row:6;" onclick="speak('yes')"></div>
    <div class="cell" style="grid-column:2;grid-row:6;" onclick="speak('your')"></div>
    <div class="cell" style="grid-column:3;grid-row:6;" onclick="speak('no')"></div>
    <div class="cell" style="grid-column:4;grid-row:6;" onclick="speak('want')"></div>
    <div class="cell" style="grid-column:5;grid-row:6;" onclick="speak('take')"></div>
    <div class="cell" style="grid-column:6;grid-row:6;" onclick="speak('tell')"></div>
    <div class="cell" style="grid-column:7;grid-row:6;" onclick="speak('turn')"></div>
    <div class="cell" style="grid-column:8;grid-row:6;" onclick="go('watch.html')"></div>
    <div class="cell" style="grid-column:9;grid-row:6;" onclick="speak('down')"></div>
    <div class="cell" style="grid-column:10;grid-row:6;" onclick="speak('with')"></div>

  </div>
</div>

<script>
function speak(text){
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
