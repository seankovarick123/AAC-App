<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
  display: block;
}

/* GRID FIXED TO TILE AREA */
.grid {
  position: absolute;
  top: 22%;     /* pushes grid down to tiles */
  left: 0;
  width: 100%;
  height: 75%;  /* only covers tile area */
  z-index: 999;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="home.png" class="bg">

  <div class="grid">

    <!-- WATCH (TEST TILE) -->
    <div class="cell" style="
      grid-column:8; 
      grid-row:6; 
      background: rgba(0,255,0,0.4);
    " onclick="goWatch()"></div>

  </div>
</div>

<script>
function goWatch(){
  window.location.href = "watch.html";
}
</script>

</body>
</html>
