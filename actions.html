<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

/* GRID OUTLINE (you will adjust this) */
.grid {
  position: absolute;
  top: 0%;
  left: 0%;
  width: 100%;
  height: 100%;
  border: 3px solid red;
  box-sizing: border-box;
}
</style>
</head>

<body>

<div class="container">
  <img src="Actions.jpeg" class="bg">

  <!-- GRID BOX -->
  <div class="grid"></div>

</div>

</body>
</html>
