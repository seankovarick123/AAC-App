<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

/* SAME GRID AS HOME */
.grid {
  position: absolute;
  top: 12%;
  left: 0%;
  width: 100%;
  height: 88%;
  z-index: 999;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="actions.png" class="bg">

  <div class="grid">

    <!-- HOME BUTTON -->
    <div class="cell" style="grid-column:1; grid-row:1;" onclick="goHome()"></div>

    <!-- EXAMPLES (you can expand later) -->
    <div class="cell" style="grid-column:2; grid-row:1;" onclick="speak('answer')"></div>
    <div class="cell" style="grid-column:3; grid-row:1;" onclick="speak('buy')"></div>
    <div class="cell" style="grid-column:4; grid-row:1;" onclick="speak('call')"></div>

  </div>
</div>

<script>
function goHome(){
  window.location.href = "index.html";
}

function speak(word){
  speechSynthesis.speak(new SpeechSynthesisUtterance(word));
}
</script>

</body>
</html>
