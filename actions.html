<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0%;
  width: 100%;
  height: 88%;
  z-index: 999;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="actions.png" class="bg">

  <div class="grid">

    <!-- ROW 1 -->
    <div class="cell" style="grid-column:1; grid-row:1;" onclick="goHome()"></div>
    <div class="cell" style="grid-column:2; grid-row:1;" onclick="speak('answer')"></div>
    <div class="cell" style="grid-column:3; grid-row:1;" onclick="speak('buy')"></div>
    <div class="cell" style="grid-column:4; grid-row:1;" onclick="speak('call')"></div>
    <div class="cell" style="grid-column:5; grid-row:1;" onclick="speak('clean')"></div>
    <div class="cell" style="grid-column:6; grid-row:1;" onclick="speak('cook')"></div>
    <div class="cell" style="grid-column:7; grid-row:1;" onclick="speak('color')"></div>
    <div class="cell" style="grid-column:8; grid-row:1;" onclick="speak('close')"></div>
    <div class="cell" style="grid-column:9; grid-row:1;" onclick="speak('cuddle')"></div>
    <div class="cell" style="grid-column:10; grid-row:1;" onclick="speak('give')"></div>

    <!-- ROW 2 -->
    <div class="cell" style="grid-column:1; grid-row:2;" onclick="speak('clear')"></div>
    <div class="cell" style="grid-column:2; grid-row:2;" onclick="speak('I')"></div>
    <div class="cell" style="grid-column:3; grid-row:2;" onclick="speak('me')"></div>
    <div class="cell" style="grid-column:4; grid-row:2;"></div>
    <div class="cell" style="grid-column:5; grid-row:2;" onclick="speak('then')"></div>
    <div class="cell" style="grid-column:6; grid-row:2;" onclick="speak('come')"></div>
    <div class="cell" style="grid-column:7; grid-row:2;" onclick="speak('that')"></div>
    <div class="cell" style="grid-column:8; grid-row:2;" onclick="speak('a')"></div>
    <div class="cell" style="grid-column:9; grid-row:2;" onclick="speak('groups')"></div>
    <div class="cell" style="grid-column:10; grid-row:2;" onclick="speak('more')"></div>

    <!-- ROW 3 -->
    <div class="cell" style="grid-column:1; grid-row:3;" onclick="speak('21')"></div>
    <div class="cell" style="grid-column:2; grid-row:3;" onclick="speak('22')"></div>
    <div class="cell" style="grid-column:3; grid-row:3;" onclick="speak('23')"></div>
    <div class="cell" style="grid-column:4; grid-row:3;" onclick="speak('24')"></div>
    <div class="cell" style="grid-column:5; grid-row:3;" onclick="speak('25')"></div>
    <div class="cell" style="grid-column:6; grid-row:3;" onclick="speak('26')"></div>
    <div class="cell" style="grid-column:7; grid-row:3;" onclick="speak('27')"></div>
    <div class="cell" style="grid-column:8; grid-row:3;" onclick="speak('28')"></div>
    <div class="cell" style="grid-column:9; grid-row:3;" onclick="speak('29')"></div>
    <div class="cell" style="grid-column:10; grid-row:3;" onclick="speak('30')"></div>

    <!-- ROW 4 -->
    <div class="cell" style="grid-column:1; grid-row:4;" onclick="speak('31')"></div>
    <div class="cell" style="grid-column:2; grid-row:4;" onclick="speak('32')"></div>
    <div class="cell" style="grid-column:3; grid-row:4;" onclick="speak('33')"></div>
    <div class="cell" style="grid-column:4; grid-row:4;" onclick="speak('34')"></div>
    <div class="cell" style="grid-column:5; grid-row:4;" onclick="speak('35')"></div>
    <div class="cell" style="grid-column:6; grid-row:4;" onclick="speak('36')"></div>
    <div class="cell" style="grid-column:7; grid-row:4;" onclick="speak('37')"></div>
    <div class="cell" style="grid-column:8; grid-row:4;" onclick="speak('38')"></div>
    <div class="cell" style="grid-column:9; grid-row:4;" onclick="speak('39')"></div>
    <div class="cell" style="grid-column:10; grid-row:4;" onclick="speak('40')"></div>

    <!-- ROW 5 -->
    <div class="cell" style="grid-column:1; grid-row:5;" onclick="speak('41')"></div>
    <div class="cell" style="grid-column:2; grid-row:5;" onclick="speak('42')"></div>
    <div class="cell" style="grid-column:3; grid-row:5;" onclick="speak('43')"></div>
    <div class="cell" style="grid-column:4; grid-row:5;" onclick="speak('44')"></div>
    <div class="cell" style="grid-column:5; grid-row:5;" onclick="speak('45')"></div>
    <div class="cell" style="grid-column:6; grid-row:5;" onclick="speak('46')"></div>
    <div class="cell" style="grid-column:7; grid-row:5;" onclick="speak('47')"></div>
    <div class="cell" style="grid-column:8; grid-row:5;" onclick="speak('48')"></div>
    <div class="cell" style="grid-column:9; grid-row:5;" onclick="speak('49')"></div>
    <div class="cell" style="grid-column:10; grid-row:5;" onclick="speak('50')"></div>

    <!-- ROW 6 -->
    <div class="cell" style="grid-column:1; grid-row:6;" onclick="speak('51')"></div>
    <div class="cell" style="grid-column:2; grid-row:6;" onclick="speak('52')"></div>
    <div class="cell" style="grid-column:3; grid-row:6;" onclick="speak('53')"></div>
    <div class="cell" style="grid-column:4; grid-row:6;" onclick="speak('54')"></div>
    <div class="cell" style="grid-column:5; grid-row:6;" onclick="speak('55')"></div>
    <div class="cell" style="grid-column:6; grid-row:6;" onclick="speak('56')"></div>
    <div class="cell" style="grid-column:7; grid-row:6;" onclick="speak('57')"></div>
    <div class="cell" style="grid-column:8; grid-row:6;" onclick="speak('58')"></div>
    <div class="cell" style="grid-column:9; grid-row:6;" onclick="speak('59')"></div>
    <div class="cell" style="grid-column:10; grid-row:6;" onclick="speak('60')"></div>

  </div>
</div>

<script>
function goHome(){
  window.location.href = "index.html";
}

function speak(word){
  const msg = new SpeechSynthesisUtterance(word);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}
</script>

</body>
</html>
