<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

/* GRID AREA (this is the key part) */
.grid {
  position: absolute;
  top: 18%;      /* adjust this once */
  left: 8%;      /* adjust this once */
  width: 84%;    /* covers grid area */
  height: 70%;
}

/* EACH TILE */
.tile {
  position: absolute;
  width: 22%;    /* 4 columns */
  height: 12%;
  background: rgba(255,0,0,0.3);
}
</style>
</head>

<body>

<div class="container">
  <img src="Actions.jpeg" class="bg">

  <!-- BACK -->
  <a href="index.html" style="
    position:absolute;
    top:0%;
    left:0%;
    width:25%;
    height:15%;
    background: rgba(0,255,0,0.3);
  "></a>

  <div class="grid">

    <!-- ROW 1 -->
    <div class="tile" style="top:0%; left:0%;" onclick="speak('answer')"></div>
    <div class="tile" style="top:0%; left:26%;" onclick="speak('buy')"></div>
    <div class="tile" style="top:0%; left:52%;" onclick="speak('call')"></div>
    <div class="tile" style="top:0%; left:78%;" onclick="speak('clean')"></div>

  </div>

</div>

<script>
function speak(word){
  speechSynthesis.speak(new SpeechSynthesisUtterance(word));
}
</script>

</body>
</html>
