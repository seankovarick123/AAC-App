<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

/* GRID OVERLAY */
.grid {
  position: absolute;
  top: 18%;      /* adjust once */
  left: 6%;      /* adjust once */
  width: 88%;
  height: 72%;

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: 6px;
}

/* EACH BOX */
.cell {
  border: 2px solid red;
  background: rgba(255,0,0,0.15);
}
</style>
</head>

<body>

<div class="container">
  <img src="Actions.jpeg" class="bg">

  <div class="grid">

    <!-- ROW 1 -->
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

    <!-- ROW 2 -->
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

    <!-- ROW 3 -->
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

    <!-- ROW 4 -->
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

  </div>

</div>

</body>
</html>
