<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: sans-serif; }

.container {
  position: relative;
}

.bg {
  width: 100%;
  display: block;
}

/* PERFECT GRID */
.grid {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

/* CLICK AREAS */
.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>
