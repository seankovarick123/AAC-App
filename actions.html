<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container {
  position: relative;
}

.bg {
  width: 100%;
}

/* GRID OVERLAY */
.grid {
  position: absolute;

  /* YOU WILL ADJUST THESE 4 NUMBERS ONLY */
  top: 15%;
  left: 4%;
  width: 92%;
  height: 78%;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);

  gap: 2px;
}

/* EACH TILE BOX */
.cell {
  border: 1px solid red;
  background: rgba(255,0,0,0.15);
}
</style>
</head>

<body>

<div class="container">
  <img src="Actions.jpeg" class="bg">

  <div class="grid">

    <!-- 60 CELLS -->
    <!-- ROW 1 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

    <!-- ROW 2 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

    <!-- ROW 3 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

    <!-- ROW 4 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

    <!-- ROW 5 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

    <!-- ROW 6 -->
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

  </div>

</div>

</body>
</html>
