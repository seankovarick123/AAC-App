<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg { width: 100%; }

.tile {
  position: absolute;
}
</style>
</head>

<body>

<div class="container">
  <img src="Actions.jpeg" class="bg">

  <!-- BACK -->
  <a href="index.html" class="tile" style="
    top:0%;
    left:0%;
    width:20%;
    height:15%;
  "></a>

  <!-- ROW 1 -->
<div class="tile" style="top:30%; left:5%; width:18%; height:12%; background: rgba(255,0,0,0.3);" onclick="speak('answer')"></div>
<div class="tile" style="top:30%; left:25%; width:18%; height:12%; background: rgba(0,255,0,0.3);" onclick="speak('buy')"></div>
<div class="tile" style="top:30%; left:45%; width:18%; height:12%; background: rgba(0,0,255,0.3);" onclick="speak('call')"></div>
<div class="tile" style="top:30%; left:65%; width:18%; height:12%; background: rgba(255,255,0,0.3);" onclick="speak('clean')"></div>

  <!-- ROW 2 -->
  <div class="tile" style="top:45%; left:5%; width:18%; height:12%;" onclick="speak('cook')"></div>
  <div class="tile" style="top:45%; left:25%; width:18%; height:12%;" onclick="speak('dance')"></div>
  <div class="tile" style="top:45%; left:45%; width:18%; height:12%;" onclick="speak('draw')"></div>
  <div class="tile" style="top:45%; left:65%; width:18%; height:12%;" onclick="speak('drink')"></div>

</div>

<script>
function speak(word){
  speechSynthesis.speak(new SpeechSynthesisUtterance(word));
}
</script>

</body>
</html>
