<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="people.png" class="bg">

  <div class="grid">

    <!-- HOME -->
    <div class="cell" style="grid-column:1;grid-row:1;" onclick="goHome()"></div>

    <!-- TEST TILE -->
    <div class="cell" style="grid-column:2;grid-row:1;" onclick="speakNow('mom')"></div>

  </div>
</div>

<script>
// LOCAL SPEECH (bypasses app.js issues)
function speakNow(word){
  const msg = new SpeechSynthesisUtterance(word);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
