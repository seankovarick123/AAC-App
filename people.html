<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="people.png" class="bg">

  <div class="grid">

    <!-- HOME -->
    <div class="cell" style="grid-column:1;grid-row:1;" onclick="goHome()"></div>

    <!-- MOM -->
    <div class="cell" style="grid-column:2;grid-row:1;" onclick="speak('mom')"></div>

    <!-- DAD -->
    <div class="cell" style="grid-column:3;grid-row:1;" onclick="speak('dad')"></div>

    <!-- FRIEND -->
    <div class="cell" style="grid-column:4;grid-row:1;" onclick="speak('friend')"></div>

  </div>
</div>

<script>
// GLOBAL SPEECH FUNCTION (same across ALL pages)
function speak(text) {
  const synth = window.speechSynthesis;

  // Ensure voices are loaded
  if (synth.getVoices().length === 0) {
    synth.onvoiceschanged = () => speak(text);
    return;
  }

  const msg = new SpeechSynthesisUtterance(text);

  // Optional tuning (can remove if you want)
  msg.rate = 1;
  msg.pitch = 1;
  msg.volume = 1;

  synth.cancel(); // stop previous speech
  synth.speak(msg);
}

// NAVIGATION
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
