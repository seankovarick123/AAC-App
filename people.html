<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <!-- ✅ FIXED IMAGE -->
  <img src="people.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text) {
  const synth = window.speechSynthesis;

  if (synth.getVoices().length === 0) {
    synth.onvoiceschanged = () => speak(text);
    return;
  }

  const msg = new SpeechSynthesisUtterance(text);
  synth.cancel();
  synth.speak(msg);
}

function goHome(){
  window.location.href = "index.html";
}

const columns = 10;
const rows = 6;

// ✅ PEOPLE ACTIONS (NOT PLACES)
const actions = {
  "1-1": "HOME",
  "2-1": "mom",
  "3-1": "dad",
  "4-1": "friend",
  "5-1": "grandma",

  "1-2": "grandpa",
  "2-2": "teacher",
  "3-2": "doctor",
  "4-2": "brother",
  "5-2": "sister",

  "1-3": "neighbor",
  "2-3": "friend",
  "3-3": "classmate",
  "4-3": "coach",
  "5-3": "caregiver"
};

const grid = document.getElementById("grid");

for (let r = 1; r <= rows; r++) {
  for (let c = 1; c <= columns; c++) {

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.gridColumn = c;
    cell.style.gridRow = r;

    const key = `${c}-${r}`;

    if (actions[key]) {
      if (actions[key] === "HOME") {
        cell.onclick = goHome;
      } else {
        cell.onclick = () => speak(actions[key]);
      }
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
