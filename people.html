<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

/* MATCH THIS WITH YOUR MAIN PAGE */
.grid {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  grid-template-rows: repeat(5,1fr);
}

/* DEBUG GRID (REMOVE LATER) */
.cell {
  width:100%;
  height:100%;
  border: 1px solid red;
}
</style>
</head>

<body>

<div class="container">
  <img src="people.png" class="bg">

  <div class="grid">

    <!-- ROW 1 -->
    <div class="cell" style="grid-column:1;grid-row:1;" onclick="goHome()"></div>
    <div class="cell" style="grid-column:2;grid-row:1;" onclick="speak('mom')"></div>
    <div class="cell" style="grid-column:3;grid-row:1;" onclick="speak('dad')"></div>
    <div class="cell" style="grid-column:4;grid-row:1;" onclick="speak('friend')"></div>

    <!-- ROW 2 -->
    <div class="cell" style="grid-column:1;grid-row:2;" onclick="speak('grandma')"></div>
    <div class="cell" style="grid-column:2;grid-row:2;" onclick="speak('grandpa')"></div>
    <div class="cell" style="grid-column:3;grid-row:2;" onclick="speak('teacher')"></div>
    <div class="cell" style="grid-column:4;grid-row:2;" onclick="speak('doctor')"></div>

    <!-- ROW 3 -->
    <div class="cell" style="grid-column:1;grid-row:3;" onclick="speak('brother')"></div>
    <div class="cell" style="grid-column:2;grid-row:3;" onclick="speak('sister')"></div>
    <div class="cell" style="grid-column:3;grid-row:3;" onclick="speak('friend')"></div>
    <div class="cell" style="grid-column:4;grid-row:3;" onclick="speak('neighbor')"></div>

    <!-- ROW 4 -->
    <div class="cell" style="grid-column:1;grid-row:4;" onclick="speak('baby')"></div>
    <div class="cell" style="grid-column:2;grid-row:4;" onclick="speak('caregiver')"></div>
    <div class="cell" style="grid-column:3;grid-row:4;" onclick="speak('coach')"></div>
    <div class="cell" style="grid-column:4;grid-row:4;" onclick="speak('classmate')"></div>

    <!-- ROW 5 -->
    <div class="cell" style="grid-column:1;grid-row:5;" onclick="speak('help me find someone')"></div>
    <div class="cell" style="grid-column:2;grid-row:5;" onclick="speak('I want to talk to someone')"></div>
    <div class="cell" style="grid-column:3;grid-row:5;" onclick="speak('call someone')"></div>
    <div class="cell" style="grid-column:4;grid-row:5;" onclick="speak('I miss someone')"></div>

  </div>
</div>

<script>
// UNIVERSAL SPEECH FUNCTION
function speak(text) {
  const synth = window.speechSynthesis;

  if (synth.getVoices().length === 0) {
    synth.onvoiceschanged = () => speak(text);
    return;
  }

  const msg = new SpeechSynthesisUtterance(text);
  synth.cancel();
  synth.speak(msg);
}

// NAVIGATION
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
