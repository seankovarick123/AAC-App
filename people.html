<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; }
.container { position: relative; }
.bg { width: 100%; display: block; }

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell { width:100%; height:100%; }
</style>
</head>
<body>

<div class="container">
  <img src="people.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(t){ speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
function goHome(){ location.href="index.html"; }

const actions = {
  // ROW 1
  "1-1":"HOME","2-1":"mom","3-1":"dad","4-1":"brother","5-1":"sister",
  "6-1":"grandma","7-1":"grandpa","8-1":"friend","9-1":"teacher","10-1":"doctor",

  // ROW 2
  "1-2":"neighbor","2-2":"coach","3-2":"classmate","4-2":"caregiver","5-2":"baby",

  // ROW 3
  "1-3":"I want to talk to someone","2-3":"call someone","3-3":"I miss someone","4-3":"help me find someone"
};

buildGrid(actions);

function buildGrid(actions){
  const grid = document.getElementById("grid");
  for(let r=1;r<=6;r++){
    for(let c=1;c<=10;c++){
      let cell=document.createElement("div");
      cell.className="cell";
      cell.style.gridColumn=c;
      cell.style.gridRow=r;

      let key=`${c}-${r}`;
      if(actions[key]){
        if(actions[key]==="HOME"){ cell.onclick=goHome; }
        else{ cell.onclick=()=>speak(actions[key]); }
      }

      grid.appendChild(cell);
    }
  }
}
</script>
</body>
</html>
