<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="people.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(text){
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function goHome(){
  window.location.href = "index.html";
}

// 👉 NEXT PAGE (arrow)
function goNext(){
  // change if you have a specific next page
  window.location.href = "people2.html";
}

const columns = 10;
const rows = 6;

const actions = {
"1-1":"HOME","2-1":"people","3-1":"family","4-1":"mom","5-1":"dad","6-1":"Jayden","7-1":"grandma","8-1":"grandpa","9-1":"husband","10-1":"wife",

"2-2":"mine","4-2":"Nannie","5-2":"Grandpa","6-2":"DD","7-2":"Nonno","8-2":"baby","9-2":"and","10-2":"lock page",

"1-3":"they","2-3":"their","3-3":"them","5-3":"Anna C","6-3":"Anna","7-3":"Uncle B","8-3":"big","9-3":"sister","10-3":"brother",

"1-4":"she","2-4":"her","4-4":"friend","5-4":"Luca","6-4":"Gaga","7-4":"Danielle and Kyle","8-4":"little","9-4":"girl","10-4":"boy",

"1-5":"he","2-5":"his","3-5":"him","6-5":"Nadia","9-5":"children","10-5":"child",

"1-6":"we","2-6":"our","3-6":"us","4-6":"let's","6-6":"school people","7-6":"jobs","9-6":"kid"
};

const speechOverrides = {
  "6-2": "Dee Dee",
  "5-3": "Anna C",
  "7-3": "Uncle B"
};

function speakTile(key){
  speak(speechOverrides[key] || actions[key]);
}

const grid = document.getElementById("grid");

for (let r = 1; r <= rows; r++) {
  for (let c = 1; c <= columns; c++) {

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.style.gridColumn = c;
    cell.style.gridRow = r;

    const key = `${c}-${r}`;

    if (key === "1-1") {
      cell.onclick = goHome;
    }
    else if (key === "10-6") {
      cell.onclick = goNext;
    }
    else if (actions[key]) {
      cell.onclick = () => speakTile(key);
    }

    grid.appendChild(cell);
  }
}
</script>

</body>
</html>
