<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }

.container { position: relative; }

.bg {
  width: 100%;
  display: block;
}

.grid {
  position: absolute;
  top: 8%;
  left: 0;
  width: 100%;
  height: 85%;
  z-index: 10;

  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}

.cell {
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div class="container">
  <img src="watch.png" class="bg">

  <div class="grid">

    <!-- HOME BUTTON -->
    <div class="cell" style="grid-column:1; grid-row:1;" onclick="goHome()"></div>

    <!-- Example: Disney tile (adjust later if needed) -->
    <div class="cell" style="grid-column:2; grid-row:1;" onclick="goWatch2()"></div>

  </div>
</div>

<script>
function goHome(){
  window.location.href = "index.html";
}

function goWatch2(){
  window.location.href = "watch2.html";
}
</script>

</body>
</html>
