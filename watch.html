<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; }
.container { position: relative; }
.bg { width: 100%; }

.grid {
  position: absolute;
  top: 12%;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
}
.cell { width:100%; height:100%; }
</style>
</head>

<body>

<div class="container">
  <img src="watch.png" class="bg">

  <div class="grid">

    <div class="cell" style="grid-column:1;grid-row:1;" onclick="goHome()"></div>

    <div class="cell" style="grid-column:2;grid-row:1;" onclick="go('disney','watch2.html')"></div>

    <div class="cell" style="grid-column:3;grid-row:1;" onclick="openYouTube()"></div>

  </div>
</div>

<script src="app.js"></script>

<script>
function openYouTube(){
  speak('youtube');
  setTimeout(()=>{
    window.open("https://youtube.com","_blank");
  },300);
}
</script>

</body>
</html>
