<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; }
.container { position: relative; }
.bg { width: 100%; display: block; }

.grid {
  position: absolute;
  top: 12%;
  left: 0;
  width: 100%;
  height: 88%;
  display: grid;
  grid-template-columns: repeat(10,1fr);
  grid-template-rows: repeat(6,1fr);
}

.cell { width:100%; height:100%; }
</style>
</head>
<body>

<div class="container">
  <img src="watch.png" class="bg">
  <div class="grid" id="grid"></div>
</div>

<script>
function speak(t){ speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
function goHome(){ location.href="index.html"; }
function goWatch2(){ location.href="watch2.html"; }

const actions = {
  "1-1":"HOME","2-1":"YouTube","3-1":"TV","4-1":"movie","5-1":"cartoon","6-1":"show",
  "1-2":"I want to watch","2-2":"pause","3-2":"play"
};

buildGrid(actions);

function buildGrid(actions){
  const grid=document.getElementById("grid");
  for(let r=1;r<=6;r++){
    for(let c=1;c<=10;c++){
      let cell=document.createElement("div");
      cell.className="cell";
      cell.style.gridColumn=c;
      cell.style.gridRow=r;

      let key=`${c}-${r}`;
      if(actions[key]){
        if(actions[key]==="HOME"){ cell.onclick=goHome; }
        else if(actions[key]==="YouTube"){ cell.onclick=goWatch2; }
        else{ cell.onclick=()=>speak(actions[key]); }
      }

      grid.appendChild(cell);
    }
  }
}
</script>
</body>
</html>
